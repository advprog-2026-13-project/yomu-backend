spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/yomu
    username: yomu
    password: yomu

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  flyway:
    enabled: false

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-in-prod-1234567890123456}
    expiration-minutes: 120

logging:
  level:
    org.springframework.security: DEBUG